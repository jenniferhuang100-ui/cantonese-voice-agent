<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拍友網球專門店 — 智能網球客服</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero-section">
        <div class="hero-overlay">
            <h1>拍友網球專門店</h1>
            <p>專業網球拍推薦及專人預約 Fitting 服務 — 為你搵到最完美嘅擊球拍擋</p>
        </div>
    </header>

    <main class="catalog-container">
        <h2>現貨波拍款式</h2>
        <div class="catalog-grid" id="catalogGrid"></div>
    </main>

    <div class="floating-chat-widget">
        <button class="chat-toggle-btn" id="chatToggleBtn">💬 同我哋傾吓</button>
        <div class="chat-window hidden" id="chatWindow">
            <header class="widget-header">
                <span class="avatar">🎾</span>
                <div class="header-text">
                    <h3>拍友智能助理</h3>
                    <small>線上廣東話客服</small>
                </div>
                <button class="close-btn" id="closeChatBtn">×</button>
            </header>
            <div class="message-log" id="messageLog">
                <div class="msg bot-msg">你好！歡迎嚟到「拍友」網球專門店！想搵新拍定係預約 Fitting？我都可以幫到你。🎾</div>
            </div>
            <footer class="widget-input-tray">
                <input type="text" id="widgetInput" placeholder="請輸入訊息..." autocomplete="off">
                <button id="widgetSendBtn">➤</button>
            </footer>
        </div>
    </div>

    <script>
        // Backend base URL, computed once here and reused by voice-widget.js.
        const isLocalHost = ['localhost', '127.0.0.1', ''].includes(window.location.hostname);
        window.API_BASE = window.API_URL || (isLocalHost ? 'http://localhost:5000' : 'https://cantonese-voice-agent-production.up.railway.app');

        // Single source of truth: the grid renders the same racquets.json the
        // agent recommends from, served by the backend's /catalog endpoint.
        const grid = document.getElementById('catalogGrid');
        fetch(`${window.API_BASE}/catalog`)
            .then(res => {
                if (!res.ok) throw new Error('Catalog fetch failed: ' + res.status);
                return res.json();
            })
            .then(racquets => {
                racquets.filter(p => p.in_stock).forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <div class="tag">${p.brand}</div>
                        <h3>${p.model}</h3>
                        <p class="specs">重量: ${p.weight_g}g | 拍面: ${p.head_size_sqin}sq in</p>
                        <p class="desc">適合: ${p.tagline_zh || p.best_for.join(' / ')}</p>
                        <div class="price">HKD $${p.price_hkd}</div>
                    `;
                    grid.appendChild(card);
                });
            })
            .catch(err => {
                console.error(err);
                grid.innerHTML = '<p class="catalog-error">暫時載入唔到產品目錄 — 請確認後台伺服器（Flask）開咗先，再refresh呢頁。</p>';
            });
    </script>
    <script src="voice-widget.js"></script>
</body>
</html>
