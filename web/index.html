<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拍友網球專門店 — 智能網球客服</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero-section">
        <div class="hero-overlay">
            <h1>拍友網球專門店</h1>
            <p>專業網球拍推薦及專人預約 Fitting 服務 — 為你搵到最完美嘅擊球拍擋</p>
        </div>
    </header>

    <main class="catalog-container">
        <h2>現貨波拍款式</h2>
        <div class="catalog-grid" id="catalogGrid"></div>
    </main>

    <div class="floating-chat-widget">
        <button class="chat-toggle-btn" id="chatToggleBtn">💬 同我哋傾吓</button>
        <div class="chat-window hidden" id="chatWindow">
            <header class="widget-header">
                <span class="avatar">🎾</span>
                <div class="header-text">
                    <h3>拍友智能助理</h3>
                    <small>線上廣東話客服</small>
                </div>
                <button class="close-btn" id="closeChatBtn">×</button>
            </header>
            <div class="message-log" id="messageLog">
                <div class="msg bot-msg">你好！歡迎嚟到「拍友」網球專門店！想搵新拍定係預約 Fitting？我都可以幫到你。🎾</div>
            </div>
            <footer class="widget-input-tray">
                <input type="text" id="widgetInput" placeholder="請輸入訊息..." autocomplete="off">
                <button id="widgetSendBtn">➤</button>
            </footer>
        </div>
    </div>

    <script>
        const RACQUET_CATALOG = [
          {"id": "wilson-blade-98-v9", "brand": "Wilson", "model": "Blade 98 V9", "price_hkd": 1980, "weight_g": 305, "head_size_sqin": 98, "best_for": "進階控球 / 底線抽擊"},
          {"id": "babolat-pure-drive-2021", "brand": "Babolat", "model": "Pure Drive", "price_hkd": 1750, "weight_g": 300, "head_size_sqin": 100, "best_for": "中級爆發力 / 借力抽擊"},
          {"id": "head-speed-mp-2024", "brand": "Head", "model": "Speed MP 2024", "price_hkd": 1850, "weight_g": 300, "head_size_sqin": 100, "best_for": "雙打全能 / 網前截擊"},
          {"id": "yonex-ezone-100", "brand": "Yonex", "model": "EZONE 100", "price_hkd": 1680, "weight_g": 300, "head_size_sqin": 100, "best_for": "大甜區 / 高容錯初中級"},
          {"id": "wilson-pro-staff-97-v14", "brand": "Wilson", "model": "Pro Staff 97 V14", "price_hkd": 2180, "weight_g": 315, "head_size_sqin": 97, "best_for": "高級進攻 / 極致手感"},
          {"id": "babolat-pure-aero-2023", "brand": "Babolat", "model": "Pure Aero", "price_hkd": 1820, "weight_g": 300, "head_size_sqin": 100, "best_for": "強力上旋 / 進階抽擊"},
          {"id": "head-boom-team-l", "brand": "Head", "model": "Boom Team L", "price_hkd": 1380, "weight_g": 260, "head_size_sqin": 107, "best_for": "初學者 / 輕量借力"},
          {"id": "yonex-vcore-98", "brand": "Yonex", "model": "VCORE 98", "price_hkd": 1720, "weight_g": 305, "head_size_sqin": 98, "best_for": "進階上旋 / 重點抽擊"},
          {"id": "wilson-ultra-100-v4", "brand": "Wilson", "model": "Ultra 100 V4", "price_hkd": 1650, "weight_g": 300, "head_size_sqin": 100, "best_for": "中級雙打 / 輕鬆借力"},
          {"id": "decathlon-artengo-tr160", "brand": "Artengo", "model": "TR160 Graph", "price_hkd": 349, "weight_g": 270, "head_size_sqin": 102, "best_for": "入門新手 / 經濟實惠"}
        ];

        const grid = document.getElementById('catalogGrid');
        RACQUET_CATALOG.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="tag">${p.brand}</div>
                <h3>${p.model}</h3>
                <p class="specs">重量: ${p.weight_g}g | 拍面: ${p.head_size_sqin}sq in</p>
                <p class="desc">適合: ${p.best_for}</p>
                <div class="price">HKD $${p.price_hkd}</div>
            `;
            grid.appendChild(card);
        });
    </script>
    <script src="voice-widget.js"></script>
</body>
</html>
